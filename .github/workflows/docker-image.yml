name: TBlog-Api Dockerfile Compile
on:
  push:
    branches: [master]
env:
   IMAGE_NAME: falseendless/tblogapi
   IMAGE_TAG: latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2.4.2
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v2.1.0
      with:
        dotnet-version: 6.0.x
    - name: Login To Docker #登录到镜像仓库
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_IMAGESTORE_USERNAME }}
        password: ${{ secrets.DOCKER_IMAGESTORE_PASSWORD }}
    - name: show dir
      run: ls
    - name: Build Docker Image # Build Docker镜像并推送到镜像仓库
      uses: docker/build-push-action@v3.0.0
      with:
        tags: falseendless/tblogapi:latest
        file: TBlog.Api/Dockerfile # 指定Dockerfile
        push: true
    - name: Docker Images Lst # 列出所有镜像
      run: docker images
